cloud_target:
  backend: openai_compat
  endpoint: http://127.0.0.1:7788
  api_key_env: ANTHROPIC_API_KEY
local_model:
  backend: ollama
  endpoint: http://127.0.0.1:11434
  chat_model: llama3.2:3b
transport:
  http: true
  http_port: 7789
pipeline:
  opt_b_redact:
    enabled: true
    strict: false
policy:
  strict_refuse_on_unknown_sensitive: false
  categories:
  - pii
  - secret
  - org_identifier
