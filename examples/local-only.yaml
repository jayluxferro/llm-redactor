local_model:
  backend: ollama
  endpoint: http://127.0.0.1:11434
  chat_model: llama3.2:3b
pipeline:
  opt_a_local_only:
    enabled: true
  opt_b_redact:
    enabled: true
    strict: false
  opt_c_rephrase:
    enabled: false
    require_validator_pass: true
  opt_h_dp_noise:
    enabled: false
    epsilon: 4.0
policy:
  strict_refuse_on_unknown_sensitive: false
  categories:
  - pii
  - secret
  - org_identifier
cloud_target:
  endpoint: http://127.0.0.1:7788/v1
