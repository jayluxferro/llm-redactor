# Cloud with redaction (proxy mode)
#
# Best for: using cloud LLMs with PII/secret protection
# Eval result: 15.3% combined leak on PII, 31.8% on secrets
# Trade-off: ~20ms latency overhead, 78% baseline quality preserved
#
# Usage:
#   cp examples/cloud-redact.yaml llm_redactor.yaml
#   export OPENAI_API_KEY=sk-...
#   uv run llm-redactor serve --port 7789
#
# Then point your agent at http://localhost:7789/v1

cloud_target:
  backend: openai_compat
  endpoint: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY

local_model:
  backend: ollama
  endpoint: http://127.0.0.1:11434
  chat_model: llama3.2:3b

transport:
  http: true
  http_port: 7789

pipeline:
  # Option B: NER + regex redaction (the practical default)
  # Catches emails, phones, IPs, SSNs, API keys, AWS keys,
  # bearer tokens, PEM keys, employee IDs, passwords, hostnames,
  # person names, org names (via Presidio NER)
  opt_b_redact: { enabled: true, strict: false }

policy:
  strict_refuse_on_unknown_sensitive: false
  categories: [pii, secret, org_identifier]
