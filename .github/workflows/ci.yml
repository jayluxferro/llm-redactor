name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests evals

      - name: Debug route registration
        run: |
          uv run python -c "
          from llm_redactor.transport.http_proxy import app
          routes = [(r.path, r.methods) for r in app.routes if hasattr(r, 'path')]
          for p, m in sorted(routes):
              print(f'  {p} {m}')
          assert any(p == '/v1/messages' for p, _ in routes), 'MISSING /v1/messages route!'
          "

      - name: Run tests
        run: uv run pytest -q -x -v tests/test_new_features.py::test_anthropic_endpoint_exists --tb=long 2>&1; uv run pytest -q

      - name: Static types (mypy)
        run: uv run mypy
